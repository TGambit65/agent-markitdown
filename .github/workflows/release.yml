name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Create GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      PYPI_TRUSTED_PUBLISHING: ${{ vars.PYPI_TRUSTED_PUBLISHING }}
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI with API token
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to PyPI with trusted publishing
        if: ${{ env.PYPI_API_TOKEN == '' && env.PYPI_TRUSTED_PUBLISHING == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Skip notice when PyPI is not configured
        if: ${{ env.PYPI_API_TOKEN == '' && env.PYPI_TRUSTED_PUBLISHING != 'true' }}
        run: >-
          echo 'PyPI publish skipped: no PYPI_API_TOKEN secret or
          PYPI_TRUSTED_PUBLISHING=true repo variable configured.'
